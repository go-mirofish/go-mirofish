name: Build Go Gateway

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "gateway/**"
      - ".github/workflows/go-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gateway-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test gateway
        working-directory: gateway
        run: go test ./...

      - name: Build gateway
        working-directory: gateway
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p bin
          suffix=""
          if [ "${GOOS}" = "windows" ]; then suffix=".exe"; fi
          go build -o "bin/mirofish-gateway-${GOOS}-${GOARCH}${suffix}" ./cmd/mirofish-gateway

      - name: Upload gateway artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirofish-gateway-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gateway/bin/mirofish-gateway-${{ matrix.goos }}-${{ matrix.goarch }}*
